name: Deploy

on:
  push:
    branches: [main]
  # Lets a failed deploy be retried from the Actions tab without an empty commit.
  workflow_dispatch:

# Pages needs these; the default GITHUB_TOKEN has neither.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. `cancel-in-progress: false` — a run already uploading should finish rather than
# be killed halfway by a newer push.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # `npm ci` needs the lockfile — it is committed for exactly this reason.
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
